<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing URL Detection Tool</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        main {
            max-width: 720px;
            margin: 60px auto;
            padding: 32px;
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
            color: #111827;
        }

        p {
            line-height: 1.6;
        }

        form {
            margin-top: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #b8c2d1;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            margin-top: 16px;
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            padding: 12px;
            margin-top: 16px;
            border-radius: 6px;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <main>
        <h1>Phishing URL Detection Tool</h1>
        <p>
            Enter a URL to check for common phishing indicators such as missing
            HTTPS, suspicious words, IP addresses, and unusual domain patterns.
        </p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/analyze" method="post">
            <label for="url">URL to analyze</label>
            <input
                type="text"
                id="url"
                name="url"
                placeholder="Example: http://secure-login-paypal.com"
            >
            <button type="submit">Analyze</button>
        </form>
    </main>
</body>
</html>
